- ruleId: MEAL_PLAN_GENERATED_FAILED
  reasonCode: MEAL_PLAN_GENERATION_FAILED
  version: 1
  scene: MEAL_PLAN_NOT_GENERATED
  title: 排餐任务已生成但客户失败
  description: 当天排餐主任务或客户排餐记录存在，但客户记录为失败状态。
  triggerConditions:
    - 客户排餐记录存在且状态为失败
  requiredTools:
    - getMealPlanGenerationSnapshot
  requiredData:
    - mealPlan
    - customerPlans
    - customerPlans.status
    - customerPlans.failReason
  decisionHints:
    - 如果客户排餐记录存在且状态失败，优先展示失败原因。
  evidenceFields:
    - mealPlan.planId
    - customerPlans.status
    - customerPlans.failReason
    - mealPlan.failReason
  nextActions:
    - 核对排餐生成日志
    - 核对失败原因字段
  severity: HIGH
  owner: meal-plan
- ruleId: MEAL_PLAN_ALREADY_EXISTS_BUT_CUSTOMER_MISSING
  reasonCode: MEAL_PLAN_ALREADY_EXISTS_BUT_CUSTOMER_MISSING
  version: 1
  scene: MEAL_PLAN_NOT_GENERATED
  title: 排餐任务存在但客户缺失
  description: 目标日期和餐次已有排餐主任务，但客户未进入客户排餐明细。
  triggerConditions:
    - mealPlan 存在
    - customerPlans 中不存在目标客户
  requiredTools:
    - getMealPlan
    - listCustomerOrders
  requiredData:
    - mealPlan.planId
    - mealPlan.totalCustomers
    - customerId
    - customerCode
  decisionHints:
    - 如果排餐主任务存在但客户明细缺失，应回到客户过滤条件、订单有效性和排餐任务输入清单核对。
  evidenceFields:
    - mealPlan.planId
    - mealPlan.totalCustomers
    - customerId
    - customerCode
  nextActions:
    - 人工核对排餐任务和客户条件
    - 核对客户是否被订单或配送规则过滤
  severity: MEDIUM
  owner: meal-plan
