server:
  port: 18081

logging:
  path: ${AGENT_LOG_PATH:./logs}

spring:
  application:
    name: agent-service
  ai:
    model:
      audio:
        speech: none
        transcription: none
      embedding: none
      image: none
    deepseek:
      api-key: ${AGENT_DEEPSEEK_API_KEY:${AGENT_OPENAI_API_KEY:unused}}
      base-url: ${AGENT_DEEPSEEK_BASE_URL:${AGENT_OPENAI_BASE_URL:https://api.deepseek.com}}
      chat:
        options:
          model: ${AGENT_DEEPSEEK_MODEL:${AGENT_OPENAI_MODEL:deepseek-chat}}

agent:
  business-time:
    zone-id: ${AGENT_BUSINESS_TIME_ZONE_ID:Asia/Shanghai}
    default-daily-expression: ${AGENT_BUSINESS_TIME_DEFAULT_DAILY_EXPRESSION:CURRENT_DAY}
  context-base-url: ${AGENT_CONTEXT_BASE_URL:http://localhost:8000}
  context-path: /api/internal/agent/meal-plan/context
  internal-token: ${AGENT_INTERNAL_TOKEN:}
  business-query-timeout-ms: ${AGENT_BUSINESS_QUERY_TIMEOUT_MS:3000}
  diagnosis:
    phase2-enabled: ${AGENT_DIAGNOSIS_PHASE2_ENABLED:true}
    tool-mode-enabled: ${AGENT_DIAGNOSIS_TOOL_MODE_ENABLED:true}
    max-tool-calls: ${AGENT_DIAGNOSIS_MAX_TOOL_CALLS:8}
    trace-enabled: ${AGENT_DIAGNOSIS_TRACE_ENABLED:true}
    suggestion-template-enabled: ${AGENT_DIAGNOSIS_SUGGESTION_TEMPLATE_ENABLED:true}
  ai:
    enabled: ${AGENT_AI_ENABLED:true}
  chat:
    max-turns: ${AGENT_CHAT_MAX_TURNS:10}
    max-diagnosis-history: ${AGENT_CHAT_MAX_DIAGNOSIS_HISTORY:3}
    intent-classifier:
      mode: ${AGENT_CHAT_INTENT_CLASSIFIER_MODE:hybrid}
    semantic-analysis:
      enabled: ${AGENT_CHAT_SEMANTIC_ANALYSIS_ENABLED:true}
      confidence-threshold: ${AGENT_CHAT_SEMANTIC_CONFIDENCE_THRESHOLD:0.80}
      business-keyword-fast-path-enabled: ${AGENT_CHAT_BUSINESS_KEYWORD_FAST_PATH_ENABLED:false}
      correction-replan-enabled: ${AGENT_CHAT_CORRECTION_REPLAN_ENABLED:true}
      unchanged-plan-on-correction: ${AGENT_CHAT_UNCHANGED_PLAN_ON_CORRECTION:CLARIFY}
    business-semantic:
      mode: ${AGENT_CHAT_BUSINESS_SEMANTIC_MODE:llm_first}
      confidence-threshold: ${AGENT_CHAT_BUSINESS_SEMANTIC_CONFIDENCE_THRESHOLD:0.80}
      pending-context-enabled: ${AGENT_CHAT_PENDING_CONTEXT_ENABLED:true}
      pending-context-ttl-minutes: ${AGENT_CHAT_PENDING_CONTEXT_TTL_MINUTES:30}
    scheduled-menu:
      default-meal-scopes: ${AGENT_CHAT_SCHEDULED_MENU_DEFAULT_MEAL_SCOPES:LUNCH,DINNER}
      include-global-rice-candidates: ${AGENT_CHAT_SCHEDULED_MENU_INCLUDE_GLOBAL_RICE_CANDIDATES:false}
