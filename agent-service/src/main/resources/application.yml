server:
  port: 18081

logging:
  path: ${AGENT_LOG_PATH:./logs}

spring:
  application:
    name: agent-service
  ai:
    model:
      audio:
        speech: none
        transcription: none
      embedding: none
      image: none
    deepseek:
      api-key: ${AGENT_DEEPSEEK_API_KEY:${AGENT_OPENAI_API_KEY:unused}}
      base-url: ${AGENT_DEEPSEEK_BASE_URL:${AGENT_OPENAI_BASE_URL:https://api.deepseek.com}}
      chat:
        options:
          model: ${AGENT_DEEPSEEK_MODEL:${AGENT_OPENAI_MODEL:deepseek-chat}}

agent:
  context-base-url: ${AGENT_CONTEXT_BASE_URL:http://localhost:8000}
  context-path: /api/internal/agent/meal-plan/context
  internal-token: ${AGENT_INTERNAL_TOKEN:}
  business-query-timeout-ms: ${AGENT_BUSINESS_QUERY_TIMEOUT_MS:3000}
  diagnosis:
    phase2-enabled: ${AGENT_DIAGNOSIS_PHASE2_ENABLED:true}
    tool-mode-enabled: ${AGENT_DIAGNOSIS_TOOL_MODE_ENABLED:true}
    max-tool-calls: ${AGENT_DIAGNOSIS_MAX_TOOL_CALLS:8}
    trace-enabled: ${AGENT_DIAGNOSIS_TRACE_ENABLED:true}
    suggestion-template-enabled: ${AGENT_DIAGNOSIS_SUGGESTION_TEMPLATE_ENABLED:true}
  ai:
    enabled: ${AGENT_AI_ENABLED:true}
  chat:
    max-turns: ${AGENT_CHAT_MAX_TURNS:10}
    max-diagnosis-history: ${AGENT_CHAT_MAX_DIAGNOSIS_HISTORY:3}
    intent-classifier:
      mode: ${AGENT_CHAT_INTENT_CLASSIFIER_MODE:hybrid}
